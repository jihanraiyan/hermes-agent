# Railway deploy config for the Sendblue iMessage gateway.
# The image ENTRYPOINT (/init -> docker/main-wrapper.sh) is kept; startCommand
# becomes the CMD, so main-wrapper runs `hermes gateway run`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gateway run"
# No healthcheck: the gateway's HTTP listener is the Sendblue webhook (bound to
# $PORT). We verify /health via the public domain after deploy. Re-add
# healthcheckPath = "/health" once the port/routing is confirmed.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
