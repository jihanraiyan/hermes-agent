# Railway deploy config for the Sendblue iMessage gateway.
# The image ENTRYPOINT (/init -> docker/main-wrapper.sh) is kept; startCommand
# becomes the CMD, so main-wrapper runs `hermes gateway run`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand: the image's CMD (["gateway","run"]) runs via the ENTRYPOINT.
# Setting a Railway startCommand would wrap it in `sh -c`, breaking main-wrapper's
# arg routing (it would try to exec `gateway` directly, which isn't on PATH).
#
# No preDeployCommand: nothing is auto-written to the /opt/data volume on deploy,
# so the agent's config.yaml, memories, sessions, and skills are never overwritten.
# The claude-sonnet-4-6 model pin lives on the volume (config.yaml) and persists
# on its own. To change the model later: upload a new config.yaml to the volume
# (`railway volume files upload ... config.yaml --overwrite`) then `railway redeploy`.
#
# The gateway's HTTP listener (Sendblue webhook, bound to $PORT) serves /health.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
